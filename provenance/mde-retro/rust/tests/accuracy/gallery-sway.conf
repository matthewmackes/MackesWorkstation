# Nested sway for the MDE-Retro PREVIEW GALLERY (headless backend).
# Like nested-sway.conf but tuned for screenshots-of-the-shell: a roomy output,
# every app window floated + centered at its requested size (so dialogs frame
# correctly instead of being tiled-stretched), and Win2000 server-side
# decorations so sway draws the navy title bars. Execs none of the user's
# autostart — fully isolated from the live desktop.
output HEADLESS-1 resolution 1280x960 position 0 0
output HEADLESS-1 bg #3a6ea5 solid_color

# Windows 2000 server-side decorations: navy focused title bar, silver inactive.
default_border normal 2
title_align left
client.focused          #0a246a #0a246a #ffffff #0a246a #0a246a
client.focused_inactive #808080 #808080 #d4d0c8 #808080 #808080
client.unfocused        #808080 #808080 #d4d0c8 #808080 #808080
font pango:Sans Bold 8

# Float + center every app window so each one is captured at its real size.
for_window [title=".*"] floating enable
for_window [app_id=".*"] floating enable
