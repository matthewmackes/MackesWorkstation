[package]
name        = "mde-applet-dock"
description = "Taskbar dock applet — bottom-bar window list (Phase E1.2.7)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mde-applet-dock"
path = "src/main.rs"

[lib]
name = "mde_applet_dock"
path = "src/lib.rs"

[dependencies]
mde-applet-api = { path = "../applet-api" }
serde          = { version = "1", features = ["derive"] }
serde_json     = "1"

[lints]
workspace = true
