[package]
name        = "mde-drawer"
description = "Mackes Desktop Environment (MDE) drawer — Iced quick-actions overlay (Phase E.8.x port of mackes/drawer.py)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mde-applet-drawer"
path = "src/main.rs"

[lib]
name = "mde_drawer"
path = "src/lib.rs"

[dependencies]
iced       = { version = "0.13", default-features = false, features = ["wgpu", "tiny-skia", "tokio", "advanced"] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
dirs       = "5"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
mde-panel  = { path = "../mde-panel" }

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code     = "forbid"
unused_must_use = "deny"
missing_docs    = "allow"

[lints.clippy]
pedantic                = { level = "allow", priority = -1 }
nursery                 = { level = "allow", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate      = "allow"
missing_errors_doc      = "allow"
missing_panics_doc      = "allow"
unwrap_used             = "warn"
panic                   = "warn"
todo                    = "warn"
