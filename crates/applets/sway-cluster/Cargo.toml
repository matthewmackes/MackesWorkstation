[package]
name        = "mde-applet-sway-cluster"
description = "Sway IPC cluster — SPLIT/LAYOUT/WINDOW chips for the panel Cluster zone (Phase E.4.1 follow-up)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mde-applet-sway-cluster"
path = "src/main.rs"

[lib]
name = "mde_applet_sway_cluster"
path = "src/lib.rs"

[dependencies]
mde-applet-api = { path = "../applet-api" }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true
