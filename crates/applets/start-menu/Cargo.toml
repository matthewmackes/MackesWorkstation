[package]
name        = "mde-applet-start-menu"
description = "Win10-style Start popover applet — pinned apps + recently-installed + search-by-name over $XDG_DATA_DIRS/applications/*.desktop"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
name = "mde_applet_start_menu"
path = "src/lib.rs"

[[bin]]
name = "mde-applet-start-menu"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
mde-applet-api = { path = "../applet-api" }
serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
