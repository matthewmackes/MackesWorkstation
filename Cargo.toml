# Cargo workspace for the Rust components of Mackes XFCE Workstation.
#
# Phase 0.1 establishes the workspace with no members yet — actual crates
# (mackes-panel, mackes-config, mackes-mesh-types) land in Phase 0.2 per
# docs/PROJECT_WORKLIST.md.
#
# The Python parts of mackes-shell continue to live at the repo root
# (mackes/, tests/, setup.py, pyproject.toml). The Rust workspace and
# Python package coexist in one repo per Q45 lock.

[workspace]
resolver = "2"
members  = [
    "crates/mackes-config",
    "crates/mackes-mesh-types",
    "crates/mackes-nebula-https-tunnel",
    "crates/mackes-panel",
    "crates/mackes-theme",
    "crates/mackes-transport",
    "crates/mackesd",
    "crates/mde-applets/app-switcher",
    "crates/mde-applets/apple-menu",
    "crates/mde-applets/applet-api",
    "crates/mde-applets/audio",
    "crates/mde-applets/bg",
    "crates/mde-applets/brightness-osd",
    "crates/mde-applets/clock",
    "crates/mde-applets/dock",
    "crates/mde-applets/mesh-status",
    "crates/mde-applets/network",
    "crates/mde-applets/notification-bell",
    "crates/mde-applets/notifications",
    "crates/mde-applets/recents",
    "crates/mde-applets/start-menu",
    "crates/mde-applets/status-cluster",
    "crates/mde-applets/sway-cluster",
    "crates/mde-applets/volume-osd",
    "crates/mde-config",
    "crates/mde-drawer",
    "crates/mde-files",
    "crates/mde-kdc",
    "crates/mde-kdc-proto",
    "crates/mde-logout-dialog",
    "crates/mde-mesh-types",
    "crates/mde-panel",
    "crates/mde-peer-card",
    "crates/mde-popover",
    "crates/mde-session",
    "crates/mde-theme",
    "crates/mde-wizard",
    "crates/mde-workbench",
    "crates/mded",
]

[workspace.package]
version      = "0.0.0"
edition      = "2021"
rust-version = "1.85"
license      = "GPL-3.0-or-later"
authors      = ["Matt Mackes <matthewmackes@gmail.com>"]
repository   = "https://github.com/matthewmackes/MAP2-RELEASES"

[workspace.lints.rust]
unsafe_code        = "forbid"
missing_docs       = "warn"
unused_must_use    = "deny"

[workspace.lints.clippy]
pedantic           = { level = "warn", priority = -1 }
nursery            = { level = "warn", priority = -1 }
unwrap_used        = "warn"
panic              = "warn"
todo               = "warn"
