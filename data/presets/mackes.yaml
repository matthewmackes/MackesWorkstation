# Mackes — the house style.
#
# Warm-dark, polished, opinionated. The aesthetic and app set that the project
# was originally built around (formerly shipped as `chupre`). Polybar + Plank
# dual-bar setup, rofi launcher, curated tool set for development work.

name: mackes
display_name: "Mackes"
description: >
  The house style — warm-dark, polished. WhiteSur-Dark theme, SF Pro Text UI,
  polybar with workspaces / weather / battery / volume modules, plank dock,
  rofi launcher. Curated development tool set.

appearance:
  gtk_theme:      "WhiteSur-Dark"
  icon_theme:     "WhiteSur-dark"
  cursor_theme:   "XCursor-Pro-Dark"
  cursor_size:    24
  font_ui:        "SF Pro Text 11"
  font_monospace: "JetBrains Mono 11"
  wallpaper:      "/usr/share/mackes-shell/data/wallpapers/mackes.png"

shell:
  apply_chupre_dotfiles: true
  polybar_profile:    "mackes"          # generated from upstream forest family
  plank_profile:      "mackes"
  rofi_profile:       "mackes"
  xfce_panel_enabled: false

devices:
  display_scaling:    "auto"
  power_profile:      "balanced"
  audio_default_sink: "pipewire"

network:
  qnm_enabled:           false
  firewall_default_zone: "FedoraWorkstation"

system:
  workspace_count:       9
  window_manager_theme:  "Default"
  notifications_enabled: true
  autostart_extras:
    - picom.desktop

apps:
  install:
    - filezilla
    - terminator
    - vlc
    - microsoft-edge-stable
    - code              # VS Code (Microsoft repo)
    - cursor            # AppImage to ~/.local/bin
    - claude-code       # `npm i -g @anthropic-ai/claude-code`
    - remmina
    - mc
    - neofetch
    - dunst

  remove_bloat:
    - gnome-software
    - gnome-tour
    - gnome-maps
    - gnome-weather
    - gnome-contacts
    - gnome-clocks
    - gnome-calendar
    - gnome-music
    - totem
    - "libreoffice-*"

  lean_xfce_remove:
    - package: xfce4-panel
      replaced_by: polybar
    - package: xfce4-appfinder
      replaced_by: rofi
    - package: xfdesktop
      replaced_by: plank
    - package: xfce4-notifyd
      replaced_by: dunst

snapshot:
  initial_snapshot_name: "mackes-baseline"
