# Mackes — the house style.
#
# Warm-dark, polished, opinionated. The aesthetic and curated tool set the
# project was built around. Standard XFCE shell underneath the house theme.

name: mackes
display_name: "Mackes"
description: >
  The house style — warm-dark, polished. Orchis-Dark GTK + IBM Plex
  typography, curated development tool set. Standard XFCE shell.

appearance:
  gtk_theme:      "Orchis-Dark"
  icon_theme:     "Black-Sun"
  cursor_theme:   "Adwaita"
  cursor_size:    24
  font_ui:        "IBM Plex Sans 11"
  font_monospace: "IBM Plex Mono 11"
  wallpaper:      "/usr/share/mackes-shell/branding/standard-wallpaper.png"

devices:
  display_scaling:    "auto"
  power_profile:      "balanced"
  audio_default_sink: "pipewire"

network:
  qnm_enabled:           false
  firewall_default_zone: "FedoraWorkstation"

system:
  workspace_count:       9
  window_manager_theme:  "Shiki-Statler"
  notifications_enabled: true
  autostart_extras: []

panel:
  # Clock plugin — captured from live xfconf as the standard layout.
  clock:
    digital-layout:      1
    digital-date-format: "%B %d, %Y"
    digital-date-font:   "IBM Plex Sans 10"
    digital-time-format: "%I:%M %p"
    digital-time-font:   "IBM Plex Sans Bold 12"

apps:
  install:
    - filezilla
    - terminator
    - vlc
    - microsoft-edge-stable
    - code              # VS Code (Microsoft repo)
    - cursor            # AppImage to ~/.local/bin
    - claude-code       # `npm i -g @anthropic-ai/claude-code`
    - remmina
    - mc
    - neofetch
    - menulibre

  remove_bloat:
    - gnome-software
    - gnome-tour
    - gnome-maps
    - gnome-weather
    - gnome-contacts
    - gnome-clocks
    - gnome-calendar
    - gnome-music
    - totem
    - "libreoffice-*"
    - asunder
    - parole
    - pragha
    - xfburn
    - transmission-gtk
    - claws-mail
    - pidgin

snapshot:
  initial_snapshot_name: "mackes-baseline"
