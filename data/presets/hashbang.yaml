# #! — the default Mackes preset.
#
# Spirit-of-CrunchBang, modern stack. Black, monospace, sparse.
# Modern tools (alacritty, neovim, firefox, mpv) wearing the CrunchBang
# aesthetic on top of a standard XFCE shell.

name: hashbang
display_name: "#!"
description: >
  Spirit of CrunchBang, modern stack. Black, monospace, deliberate.
  Standard XFCE shell with Whisker Menu, conky on the desktop.
  The first impression of Mackes.

appearance:
  gtk_theme:      "Orchis-Dark"
  icon_theme:     "Black-Sun"
  cursor_theme:   "Adwaita"
  cursor_size:    24
  font_ui:        "Red Hat Text 10"
  font_monospace: "Red Hat Mono 10"
  wallpaper:      "/usr/share/mackes-shell/branding/standard-wallpaper.png"

devices:
  display_scaling:    "auto"
  power_profile:      "balanced"
  audio_default_sink: "pipewire"

network:
  qnm_enabled:           false
  firewall_default_zone: "FedoraWorkstation"

system:
  workspace_count:       4
  window_manager_theme:  "Shiki-Statler"
  notifications_enabled: true
  autostart_extras:
    - conky.desktop

panel:
  # Clock plugin — captured from live xfconf as the standard layout.
  clock:
    digital-layout:      1
    digital-date-format: "%B %d, %Y"
    digital-date-font:   "Red Hat Text 10"
    digital-time-format: "%I:%M %p"
    digital-time-font:   "Red Hat Display Bold 12"

apps:
  # CrunchBang-spirit minimal-modern set.
  install:
    - alacritty
    - neovim
    - firefox
    - mpv
    - conky
    - menulibre

  # Single combined Bloat list (Q15) — GNOME-on-XFCE + LibreOffice + XFCE extras.
  remove_bloat:
    - gnome-software
    - gnome-tour
    - gnome-maps
    - gnome-weather
    - gnome-contacts
    - gnome-clocks
    - gnome-calendar
    - gnome-music
    - totem
    - "libreoffice-*"
    - asunder
    - parole
    - pragha
    - xfburn
    - transmission-gtk
    - claws-mail
    - pidgin

snapshot:
  initial_snapshot_name: "hashbang-baseline"
