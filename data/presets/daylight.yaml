# Daylight — cool-light, day-mode productivity.
#
# Light theme, productivity-leaning app set (office suite, mail, image
# editing). Standard XFCE shell. For users who live in the daytime and want
# a tool set built around documents and communication.

name: daylight
display_name: "Daylight"
description: >
  Cool-light, day-mode. Orchis-Dark GTK + IBM Plex typography, productivity app set
  (LibreOffice, Thunderbird, GIMP, Inkscape). For people who work in the
  daytime and care about document fidelity.

appearance:
  gtk_theme:      "Orchis-Dark"
  icon_theme:     "Black-Sun"
  cursor_theme:   "Adwaita"
  cursor_size:    24
  font_ui:        "IBM Plex Sans 11"
  font_monospace: "IBM Plex Mono 11"
  wallpaper:      "/usr/share/mackes-shell/branding/standard-wallpaper.png"

devices:
  display_scaling:    "auto"
  power_profile:      "balanced"
  audio_default_sink: "pipewire"

network:
  qnm_enabled:           false
  firewall_default_zone: "FedoraWorkstation"

system:
  workspace_count:       4
  window_manager_theme:  "Shiki-Statler"
  notifications_enabled: true
  autostart_extras: []

panel:
  # Clock plugin — captured from live xfconf as the standard layout.
  clock:
    digital-layout:      1
    digital-date-format: "%B %d, %Y"
    digital-date-font:   "IBM Plex Sans 10"
    digital-time-format: "%I:%M %p"
    digital-time-font:   "IBM Plex Sans Bold 12"

apps:
  install:
    - firefox
    - thunderbird
    - libreoffice
    - gnumeric
    - evince
    - gimp
    - inkscape
    - menulibre

  # Daylight intentionally keeps LibreOffice — it's the productivity preset.
  # XFCE extras still removed (none of them are document-focused).
  remove_bloat:
    - gnome-software
    - gnome-tour
    - gnome-maps
    - gnome-music
    - totem
    - asunder
    - parole
    - pragha
    - xfburn
    - transmission-gtk
    - claws-mail
    - pidgin

snapshot:
  initial_snapshot_name: "daylight-baseline"
