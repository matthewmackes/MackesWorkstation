# MON-2 (v2.6) — GlusterFS mesh-home health alerts.
#
# Sourced from Netdata's built-in `python.d/gluster`
# collector. Operator must verify the collector is
# enabled on aggregator + every child (MON-1's
# `apply_netdata_monitor` step locks `python.d = yes`).
#
# Thresholds locked per the v2.6 MON-2 acceptance + the
# v5.0.0 GlusterFS 25-Q design lock (`docs/design/
# v5.0.0-gluster-mesh-home.md`).

# gluster_brick_down — crit when any brick in the
# mesh-home volume is offline. A single brick down on a
# replica volume degrades the volume but doesn't break
# reads/writes; sustained down = degraded redundancy.
alarm: gluster_brick_down
   on: gluster.brick_state
lookup: max -30s of bricks_down
 every: 10s
   crit: $this > 0
  info: at least one mesh-home brick is offline; replica redundancy degraded

# gluster_heal_queue_depth — warn when >100 files are
# in the heal queue. Healthy meshes settle within a few
# files at a time; sustained high queue = brick reachable
# but glustershd is falling behind (often a brick-network
# bottleneck).
alarm: gluster_heal_queue_depth
   on: gluster.heal_queue_depth
lookup: max -2m of files_pending_heal
 every: 30s
   warn: $this > 100
  info: gluster heal queue >100 files for >2m (self-heal falling behind)

# gluster_split_brain — crit when any GFID enters split-
# brain state. The gluster_worker's GF-2.9 LWW resolver
# delegates to `gluster volume heal split-brain
# latest-mtime` which should clear most of these; this
# alarm catches the residual cases that need operator
# attention.
alarm: gluster_split_brain
   on: gluster.split_brain_count
lookup: max -30s of gfids_in_split_brain
 every: 10s
   crit: $this > 0
  info: gluster split-brain detected; LWW resolver couldn't auto-clear

# mesh_home_disk_full — warn @85% / crit @95% on the
# brick filesystem (`/var/lib/gluster/bricks/`). The
# GF-2.7 quota probe caps usage at 0.8 × min(free
# brick), so reaching 85% means the quota itself is
# approaching its ceiling AND the user-visible "Mesh
# almost full" GF-14.1 banner should already be showing.
alarm: mesh_home_disk_full
   on: disk_space._var_lib_gluster_bricks
lookup: max -1m of used_percent
 every: 30s
   warn: $this > 85
   crit: $this > 95
  info: mesh-home brick filesystem >85% (warn) / >95% (crit) full

# gluster_quorum_lost — crit when the volume loses
# quorum. On a replica-N volume this means N/2 or more
# peers are unreachable; the volume goes read-only until
# quorum returns.
alarm: gluster_quorum_lost
   on: gluster.volume_quorum
lookup: max -30s of quorum_lost
 every: 10s
   crit: $this > 0
  info: mesh-home lost quorum; volume is read-only until peers return
