# MON-2 (v2.6) — mackesd daemon health alerts.
#
# Sourced from the prometheus collector pointed at
# `http://127.0.0.1:9090/metrics` (the mded.service
# stats endpoint that the `Shell.Healthz` D-Bus method
# exposes — v4.1 wiring). Thresholds locked per the v2.6
# MON-2 acceptance + the v12.x leader-election design.

# mackesd_dbus_unresponsive — crit when the
# `Shell.Healthz` ping has been failing for >2 min. The
# Healthz call should always return within ~10 ms; >2 min
# of failure = mded is hung or crashed (systemd should
# auto-restart but the restart loop itself signals an
# operator-worthy fault).
alarm: mackesd_dbus_unresponsive
   on: mackesd.healthz_ping_success
lookup: average -2m of success_rate
 every: 30s
   crit: $this < 0.5
  info: mackesd Healthz ping <50% success over 2m; daemon hung or restart-looping

# mackesd_leader_flap — warn on >3 leader transitions in
# 10 min. Healthy leases hold for hours; rapid flapping
# means the lockfile is racing (often a clock-skew issue
# across peers or a QNM-Shared filesystem hiccup).
alarm: mackesd_leader_flap
   on: mackesd.leader_transition_count
lookup: sum -10m of transitions
 every: 1m
   warn: $this > 3
  info: mackesd leader has changed >3 times in 10m (clock skew? QNM-Shared hiccup?)

# mackesd_no_leader — crit when no peer holds the
# QNM-Shared lockfile for >60 s. Every fleet operation
# that needs a leader (CA mints, peer signs, aggregator
# election for Netdata, etc.) stalls until quorum
# returns.
alarm: mackesd_no_leader
   on: mackesd.leader_holder_count
lookup: max -1m of holders
 every: 15s
   crit: $this == 0
  info: no peer is holding the QNM-Shared leader lockfile >60s; fleet operations stalled
