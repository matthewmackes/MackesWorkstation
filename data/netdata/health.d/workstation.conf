# MON-2 (v2.6) — local workstation health alerts.
#
# Tier-1 OS-level alerts that surface real operator
# pain. Thresholds locked per the v2.6 MON-2 acceptance.
# These supplement (not replace) Netdata's stock
# workstation collectors; specifically tuned to the
# Mackes platform so the operator only sees signals
# they should act on.

# boot_disk_full — warn @90%, crit @97% on `/`. Below 90%
# is the normal operating envelope; >97% means systemd-
# journald is about to start rotating + new package
# installs will fail.
alarm: boot_disk_full
   on: disk_space._
lookup: max -1m of used_percent
 every: 30s
   warn: $this > 90
   crit: $this > 97
  info: root filesystem >90% (warn) / >97% (crit) full

# swap_thrashing — warn when swap-in pages/sec sustained
# >100 over 5 min. Indicates memory pressure that the
# OOM-killer hasn't caught yet. On a Pi-class peer this
# is a 30-min warning before the next reboot from OOM.
alarm: swap_thrashing
   on: mem.swap_activity
lookup: average -5m of swap_in_pages_per_sec
 every: 1m
   warn: $this > 100
  info: swap-in >100 pages/sec over 5m; memory pressure rising

# thermal_throttle — warn when any CPU core has been
# throttled in the last 5 min. A throttled core is a
# silent performance fault; on a Pi-class peer this
# usually means inadequate cooling.
alarm: thermal_throttle
   on: cpu.throttle_events
lookup: sum -5m of throttle_events
 every: 1m
   warn: $this > 0
  info: a CPU core has been thermally throttled in the last 5m

# unattended_updates_pending — info when the BUG-11
# watermark daemon's cache file has been signaling
# pending updates for >7 days. Not actionable urgently
# (the watermark itself surfaces this in the panel), but
# operators who don't look at the watermark for a while
# get a desktop nudge.
alarm: unattended_updates_pending
   on: dnf.pending_security_updates_age_days
lookup: max -1d of age_days
 every: 6h
   warn: $this > 7
  info: security updates pending >7 days; run `sudo dnf upgrade --refresh`
