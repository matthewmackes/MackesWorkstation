# MON-2 (v2.6) — Nebula overlay health alerts.
#
# Sourced from the prometheus collector pointed at
# `https://127.0.0.1:4244/metrics` (Nebula's built-in
# stats endpoint). Thresholds locked per the v2.6 MON-2
# acceptance + the v12.x connectivity SLOs.
#
# Loaded by Netdata after `netdatacli reload-health` (or
# next daemon restart). The MON-1.b stream-block rewriter
# triggers the reload on every CA-leader transition so
# this file's edits land without a manual operator step.

# nebula_process_down — crit when the nebula systemd unit
# has been inactive for >30 s. The clearest signal that
# the overlay is dead on this peer.
alarm: nebula_process_down
   on: systemd.service_states
lookup: max -30s of unit_state
where: unit_name == "nebula.service"
 every: 10s
   crit: $this == 4
  info: nebula.service has been inactive >30s; mesh overlay is down

# nebula_peer_unreachable — crit when any tracked peer's
# last successful handshake is >5 min old.
alarm: nebula_peer_unreachable
   on: nebula.peer_handshake_age_s
lookup: max -1m of handshake_age_s
 every: 30s
   crit: $this > 300
  info: a Nebula peer has not handshaked in >5m (likely offline or NAT-changed)

# nebula_relay_fallback_ratio — warn when >25% of peers
# have been on a relay path for >10 min. Per the v12.x
# throughput-first lock, sustained relay usage means the
# direct-UDP path isn't working AND the operator needs to
# investigate NAT / firewall config.
alarm: nebula_relay_fallback_ratio
   on: nebula.path_kind_distribution_pct
lookup: average -10m of relay_pct
 every: 1m
   warn: $this > 25
  info: >25% of peers have been on relay paths for >10m (throughput-first lock violated)

# nebula_lighthouse_unreachable — crit when both
# lighthouses have been unreachable for >2 min. Peers can
# survive briefly on cached host-map entries; sustained
# loss means the mesh can't bootstrap new peers.
alarm: nebula_lighthouse_unreachable
   on: nebula.lighthouse_reachable_count
lookup: max -2m of unreachable_count
 every: 30s
   crit: $this >= 2
  info: both Nebula lighthouses unreachable >2m; new-peer bootstrap blocked

# nebula_handshake_failure_rate — warn when >5
# handshake-failures per minute sustained over 5 min.
alarm: nebula_handshake_failure_rate
   on: nebula.handshake_failures_per_minute
lookup: average -5m of failures_per_min
 every: 1m
   warn: $this > 5
  info: nebula handshake-failure rate sustained >5/min over 5m

# nebula_first_packet_latency — warn when the p95
# first-packet latency is >3 s over 10 min. Mirrors the
# v12.x SLO "first packet < 3s" from the connectivity
# scope lock.
alarm: nebula_first_packet_latency
   on: nebula.first_packet_latency_ms_p95
lookup: percentile95 -10m of latency_ms
 every: 1m
   warn: $this > 3000
  info: nebula first-packet p95 latency >3s over 10m (violates v12.x SLO)
