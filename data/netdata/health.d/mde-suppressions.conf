# MON-2 (v2.6) — Netdata stock-alert suppressions.
#
# Disables stock Netdata alerts that don't fit the Mackes
# platform's failure-mode set (and so would be noise the
# operator learns to ignore). Per the v2.6 MON-2 design
# lock, "every alert that fires is actionable and the
# operator trusts the signal" — suppressing noise is the
# precondition for that trust.
#
# Suppression syntax: an empty `alarm:` block with the
# same name as the stock alert turns it off. Netdata
# loads files alphabetically, so this file's empty
# definitions land AFTER the matching stock alert's
# definition + override it.

# 1. cgroup memory pressure alarms — sway compositor +
#    Iced apps + the Rust panel use cgroup-v2 with
#    memory.max set; Netdata's stock cgroup_mem_usage
#    fires on every desktop session start (false
#    positive). Operators with real cgroup pressure are
#    already covered by `swap_thrashing` in workstation.
alarm: cgroup_memory_usage
   on: disabled

# 2. network interface RX/TX errors — Wi-Fi adapters
#    routinely log frame errors on busy 2.4 GHz channels;
#    the stock alarm fires constantly on operator laptops.
#    The Nebula overlay is what we actually care about;
#    that's in nebula.conf.
alarm: net_interface_errors
   on: disabled

# 3. systemd unit-state alarms for non-MDE units —
#    Netdata's stock systemd alarms fire on every
#    inactive unit (cups-browsed, packagekit, etc. that
#    the user has intentionally disabled). MDE's
#    mackesd / nebula / glusterd / kamailio-mde /
#    rtpengine-mde / mde-wayvnc / netdata alarms are
#    each explicitly defined; suppress the stock generic.
alarm: systemd_units_active
   on: disabled

# 4. disk inode usage — modern Linux filesystems
#    (ext4 with default mkfs, xfs, btrfs) don't run out
#    of inodes before disk space; the stock alarm is
#    legacy noise. Real disk-space warnings are in
#    workstation.conf (boot_disk_full).
alarm: disk_inodes_usage
   on: disabled

# 5. apps.plugin per-app CPU alarms — these fire on
#    every browser tab compile, video transcode, etc.
#    Operator productivity != alert-worthy. `cpu.throttle_events`
#    in workstation.conf catches the real signal (thermal
#    throttling indicates inadequate cooling).
alarm: apps_cpu_per_user
   on: disabled
