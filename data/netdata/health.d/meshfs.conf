# MON-2 (v5.0.0) — LizardFS mesh-storage health alerts.
#
# Sourced from Netdata's mfschunkserver module (procfs counters
# exposed by mfschunkserver on localhost:9422).
# %config(noreplace) so operator threshold edits survive upgrades.

# meshfs_chunkserver_down — crit when the local chunkserver
# is not reachable (proc exit / service crash). Netdata checks
# /proc/<pid> or the TCP port; adjust the `on:` source once the
# Netdata mfschunkserver plugin stabilises.
alarm: meshfs_chunkserver_down
   on: proc.uptime
lookup: min -1m unaligned
 units: seconds
  warn: $this < 0
  crit: $this < 0
  info: LizardFS chunkserver not reachable — mesh-storage writes blocked
    to: sysadmin

# meshfs_storage_free_low — warn when free space on the local
# brick drops below 10 %, crit below 5 %. Prevents the
# chunkserver from filling its backing store mid-replicate.
alarm: meshfs_storage_free_low
   on: disk.space
   os: linux
 calc: ($avail * 100) / ($avail + $used)
lookup: average -5m of /var/lib/mde/meshfs
 units: %
  warn: $this < 10
  crit: $this < 5
  info: LizardFS brick free space low on /var/lib/mde/meshfs
    to: sysadmin
