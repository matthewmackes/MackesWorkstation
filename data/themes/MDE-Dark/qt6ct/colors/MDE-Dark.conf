# MDE-Dark — Qt6 Fusion palette.
#
# Loaded by qt6ct via `qt6ct.conf:[Appearance] color_scheme_path = …`.
# Matches the GTK4 MDE-Dark palette so Qt6 apps blend with the rest of
# the desktop. Intel One Mono is set system-wide by the portal theme
# pump (writes ~/.config/qt6ct/qt6ct.conf:fixed_font + general_font).
#
# Section names follow qt6ct's expected key set (Active / Disabled /
# Inactive); each line is `<role>=#rrggbb`.

[ColorScheme]
active_colors=#e8eaed, #292a2d, #35363a, #1a1a1c, #202124, #2b2c2f, #e8eaed, #ffffff, #e8eaed, #292a2d, #202124, #16161a, #5b6af5, #ffffff, #5b6af5, #5b6af5, #292a2d, #e8eaed, #292a2d, #e8eaed, #fbbc04
inactive_colors=#9aa0a6, #292a2d, #35363a, #1a1a1c, #202124, #2b2c2f, #9aa0a6, #ffffff, #9aa0a6, #292a2d, #202124, #16161a, #3c4043, #9aa0a6, #5b6af5, #5b6af5, #292a2d, #e8eaed, #292a2d, #e8eaed, #fbbc04
disabled_colors=#5f6368, #292a2d, #35363a, #1a1a1c, #202124, #2b2c2f, #5f6368, #5f6368, #5f6368, #292a2d, #202124, #16161a, #3c4043, #5f6368, #5b6af5, #5b6af5, #292a2d, #e8eaed, #292a2d, #e8eaed, #fbbc04
