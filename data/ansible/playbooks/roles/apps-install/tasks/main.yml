# Role: apps-install
# Apply the active preset's apps.install list. Idempotent — dnf state=present
# is a no-op when the package is already there. Only handles dnf-backed
# entries; the Mackes-specific backends (AppImage / npm) stay GUI-driven.
---
- name: Read active preset name
  ansible.builtin.slurp:
    src: "{{ mackes_state_file }}"
  register: state_blob
  failed_when: false

- name: Decode active preset
  ansible.builtin.set_fact:
    active_preset: "{{ (state_blob.content | b64decode | from_json).active_preset | default('hashbang') }}"
  when: state_blob is defined and state_blob.content is defined

- name: Load preset YAML
  ansible.builtin.slurp:
    src: "{{ mackes_preset_dir }}/{{ active_preset | default('hashbang') }}.yaml"
  register: preset_blob
  failed_when: false

- name: Decode preset
  ansible.builtin.set_fact:
    preset_doc: "{{ preset_blob.content | b64decode | from_yaml }}"
  when: preset_blob is defined and preset_blob.content is defined

- name: Install Red Hat fonts (always)
  ansible.builtin.dnf:
    name: "{{ mackes_fonts_required }}"
    state: present

- name: Install preset.apps.install (dnf entries only)
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop: "{{ (preset_doc.apps.install | default([])) }}"
  when: preset_doc is defined
  failed_when: false        # Tolerate non-dnf names (cursor, claude-code)
