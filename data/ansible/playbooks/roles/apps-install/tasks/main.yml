# Role: apps-install
# Install the always-present Red Hat fonts. (The preset-driven app
# install/remove was dropped with the preset/drift engine, E6.11 — operator
# "remove all", 2026-06-07.)
---
- name: Install Red Hat fonts (always)
  ansible.builtin.dnf:
    name: "{{ mackes_fonts_required }}"
    state: present
