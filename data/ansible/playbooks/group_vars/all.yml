# Mackes Fleet — global variables (consumed by every role).
#
# Defaults are tuned for a typical Mackes peer. Override per-peer by
# adding host_vars/<hostname>.yml in QNM-Shared/.qnm-sync/playbooks/.

# (The preset state-file + preset-dir vars were removed with the preset/drift
# engine, E6.11 — operator "remove all", 2026-06-07.)

# Fonts that should always be present (matches the wizard's apply_fonts).
mackes_fonts_required:
  - redhat-text-fonts
  - redhat-mono-fonts

# Container runtime stack (Fedora-native; per reference material).
mackes_container_runtimes:
  - podman
  - buildah
  - skopeo
  - toolbox

# SELinux: enforcing is the locked default. The permissive playbook
# is opt-in and tagged 'never' so a regular pull won't flip it.
mackes_selinux_default_policy: enforcing
