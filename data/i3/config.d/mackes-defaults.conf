# Mackes Shell — default keyboard shortcuts (Phase 6.4)
#
# Shipped at `/usr/share/mackes-shell/i3/config.d/mackes-defaults.conf`
# and included by the main `data/i3/config` via its
# `include ~/.config/i3/config.d/*.conf` line (which `mackes-wm reset`
# seeds into the user's home).
#
# These bindings replace the planned XGrabKey + xfconf-keyboard-shortcuts
# layer with one source of truth: i3 itself. Every shortcut here is
# overridable per-host via `~/.config/i3/config.d/mackes-overrides.conf`
# which i3 loads alphabetically after this file.
#
# Bindings are documented in `docs/help/keyboard-shortcuts.md` — keep
# the two in sync.

# Apple-style menu (Mackes "M" button popover) — Phase 3.6
bindsym $mod+space exec --no-startup-id mackes-panel --apple-menu

# Notification drawer — already shipped 1.0.7 via the panel's Super+M
# handler; declared here so the binding survives `mackes-wm reset`.
bindsym $mod+m exec --no-startup-id mackes --drawer

# Phase 6.4 — six default hotkeys, locked v3.0.0 Q35
bindsym $mod+q exec --no-startup-id i3-msg [con_id=__focused__] kill
bindsym $mod+w kill
bindsym $mod+l exec --no-startup-id loginctl lock-session
bindsym $mod+v exec --no-startup-id mackes --focus clipboard
bindsym $mod+e exec --no-startup-id thunar /home/$USER/QNM-Shared

# Phase 6.2 stub — F3 spawns the Exposé overlay once it ships.
# Today it falls through to a wmctrl-based "list windows" toast so
# the keybinding is reserved + discoverable, not silently absent.
bindsym F3 exec --no-startup-id sh -c 'notify-send "Mackes" "Exposé overlay landing in 1.2.0 — for now: `wmctrl -l | wc -l` open windows"'

# Phase 6.1 stub — Super+Tab is reserved for the eventual app
# switcher. Until then i3's native focus-next behavior carries it.
# Don't bind to a one-shot — `Mod+Tab` already cycles workspaces in
# i3 default, and overriding loses that for no benefit.
