# MDE — default keyboard shortcuts (Phase D.5 port of the i3 file)
#
# Shipped at `/usr/share/mde/sway/config.d/mackes-defaults.conf` and
# included by the main `data/sway/config` via its
# `include ~/.config/sway/config.d/*.conf` line. mde-session seeds
# the user's `~/.config/sway/config.d/` from this file on first
# login.
#
# These bindings replace the planned XGrabKey + xfconf-keyboard-
# shortcuts layer (v1.x) and the i3-managed defaults (1.0.7) with
# the same source-of-truth shape. Every shortcut here is overridable
# per-host via `~/.config/sway/config.d/mackes-overrides.conf` which
# sway loads alphabetically after this file. settings::keybinds
# writes `mackes-bindings.conf` to the same directory; that file
# also wins alphabetically over this default set.
#
# Bindings are documented in `docs/help/keyboard-shortcuts.md` —
# keep the two in sync.

# Apple-style menu (Mackes "M" button popover)
bindsym $mod+space exec mde-panel --apple-menu

# Notification drawer
bindsym $mod+m exec mde --drawer

# Phase 6.4 — six default hotkeys (sway syntax, same intent)
bindsym $mod+q kill
bindsym $mod+w kill
# Portal-25 — MDE lock-screen layer-shell overlay. Replaces
# swaylock theming with a single render path that matches Portal
# visual identity (M › hostname breadcrumb + big clock + date +
# mesh/net/battery/weather indicators). Esc or Enter dismisses.
# ext-session-lock-v1 enforcement is a follow-up; this surface
# ships the visual layer today.
bindsym $mod+l exec mde-popover lock
bindsym $mod+v exec mde --focus clipboard
# `cosmic-files` ships as the recommended file manager; falls back
# to `yazi` or whatever's on $PATH.
bindsym $mod+e exec sh -c 'cosmic-files ~/QNM-Shared 2>/dev/null || yazi ~/QNM-Shared 2>/dev/null || xdg-open ~/QNM-Shared'

# F3 spawns the Exposé overlay (panel registers a layer-shell
# surface; binding here so muscle memory carries).
bindsym F3 exec mde-panel --expose

# Volume / brightness keys — settings::display::apply for brightness;
# pactl for volume.
bindsym XF86AudioRaiseVolume exec pactl set-sink-volume @DEFAULT_SINK@ +5%
bindsym XF86AudioLowerVolume exec pactl set-sink-volume @DEFAULT_SINK@ -5%
bindsym XF86AudioMute        exec pactl set-sink-mute   @DEFAULT_SINK@ toggle
bindsym XF86MonBrightnessUp  exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl set 5%-

# Screenshot — grim + slurp, Wayland-native equivalents of scrot/maim.
bindsym Print            exec grim ~/Pictures/screen-$(date +%Y%m%d-%H%M%S).png
bindsym Shift+Print      exec grim -g "$(slurp)" ~/Pictures/region-$(date +%Y%m%d-%H%M%S).png
