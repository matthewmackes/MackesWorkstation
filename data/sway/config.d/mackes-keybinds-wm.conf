# v4.0.1 WM-6 (2026-05-23) — floating window keyboard ops.
#
# Drop-in for sway config.d. Loads alphabetically AFTER
# mackes-defaults.conf so the new bindings can re-define
# anything the defaults set without manual override.
#
# Design rationale (per worklist WM-6 spec):
#   * Super+H/J/K/L stay as focus-nav (vim style, existing).
#   * Super+Shift+H/J/K/L stay as move-container (existing).
#   * NEW: Super+Ctrl+H / Super+Ctrl+L tile the focused window
#     to left/right half of the screen. Picked Super+Ctrl
#     (rather than the spec's "Super+H") so the existing focus
#     muscle memory keeps working — the worklist's "in addition
#     to existing focus-h/l" implies coexistence.
#   * NEW: Super+Ctrl+arrow moves a container between outputs.
#   * NEW: Super+Shift+F toggles floating fill (Win11 maximize-
#     like behaviour without exiting tile mode).

# ---- Tile to half ---------------------------------------------
# Left half — floating off, position 0 0, size 50% wide × 100% tall.
bindsym $mod+Ctrl+h floating disable; move position 0 0; resize set 50ppt 100ppt
bindsym $mod+Ctrl+l floating disable; move position 50ppt 0; resize set 50ppt 100ppt
# Top half / bottom half — same idea on the vertical axis.
bindsym $mod+Ctrl+k floating disable; move position 0 0; resize set 100ppt 50ppt
bindsym $mod+Ctrl+j floating disable; move position 0 50ppt; resize set 100ppt 50ppt

# ---- WM-4: Snap to quadrant (2026-05-23) ---------------------
# Win11 Snap-Assist 2x2 grid via keyboard. Super+Ctrl+Shift+
# {y,u,b,n} = TL/TR/BL/BR quadrants. Mnemonic mirrors the half
# bindings: y/u sit above h/l, b/n sit below.
bindsym $mod+Ctrl+Shift+y floating disable; move position 0 0; resize set 50ppt 50ppt
bindsym $mod+Ctrl+Shift+u floating disable; move position 50ppt 0; resize set 50ppt 50ppt
bindsym $mod+Ctrl+Shift+b floating disable; move position 0 50ppt; resize set 50ppt 50ppt
bindsym $mod+Ctrl+Shift+n floating disable; move position 50ppt 50ppt; resize set 50ppt 50ppt

# ---- WM-4: Visual Snap-Assist overlay (2026-05-23) -----------
# Super+Z opens the centered Iced overlay with 8 click-to-
# snap zones (4 halves + 4 quadrants) targeting the focused
# window. Replaces the spec's drag-detection trigger
# (sway IPC doesn't expose live pointer drag events) with a
# keybind-triggered modal — same visual outcome, different
# gesture.
bindsym $mod+z exec mde-popover snap-assist

# ---- Move between outputs -------------------------------------
# Super+Ctrl+arrow → swaymsg move container to output <direction>.
bindsym $mod+Ctrl+Left  move container to output left
bindsym $mod+Ctrl+Right move container to output right
bindsym $mod+Ctrl+Up    move container to output up
bindsym $mod+Ctrl+Down  move container to output down

# ---- Floating-fill toggle -------------------------------------
# Win11-maximize equivalent: full-screen-style sizing without
# leaving tile mode (per v8.7 lock — maximize = floating-fill,
# not true fullscreen). Toggle: if floating, exit + tile;
# otherwise float + fill.
bindsym $mod+Shift+f floating toggle, move position 0 0, resize set 100ppt 100ppt

# ---- WM-5: Alt-Tab visible window switcher --------------------
# Mod1+Tab opens the centered Iced overlay showing one card per
# open window. Tab cycles, Enter focuses, Esc cancels. Mod1 is
# Alt (not Super) — Super+Tab is reserved for workspace
# switching in mackes-defaults.conf.
bindsym Mod1+Tab exec mde-popover app-switcher

# ---- WM-2 popover keybinding ----------------------------------
# v4.0.1 WM-2 (2026-05-23) — minimized-windows popover (Super+
# Shift+S). Pairs with the existing Super+Shift+M scratchpad-
# show toggle: M restores the FIRST scratchpad window blindly
# (i3 idiom), S opens the visible picker.
bindsym $mod+Shift+s exec mde-popover minimized
