# MDE Hyprland baseline configuration.
#
# Installed by the `mde` RPM at /usr/share/mde/hyprland.conf.
# The operator's ~/.config/hypr/hyprland.conf sources this file and
# layers user overrides below. Per-peer monitor overrides live in
# ~/.config/mde/peers/<hostname>/hyprland-monitors.conf (HYP-5.d).
#
# Locks reflected here:
#   HYP-19: 4 px window-frame corners
#   HYP-20: Blur on Portal layer-shell only
#   HYP-23: Built-in animation curves only (no custom M3 beziers)
#   HYP-24: 100/120/150 ms motion grid
#   HYP-25.a: VOIP fullscreenstate windowrulev2
#   HYP-26: Tearing disabled by default
#   HYP-27.a: VRR always-on (mode 1)
#   HYP-13: Mod+Right-drag mouse-grab resize (retires keyboard mode)
#
# Authority: docs/design/v6.5-hyprland-compositor.md.

# ---------------------------------------------------------------
# General
# ---------------------------------------------------------------
# HYP-26: Tearing off globally; opt-in per-game-class via
# windowrulev2 (see docs/help/wayland.md "Allow tearing for games").
general {
    allow_tearing = false
}

# ---------------------------------------------------------------
# Misc
# ---------------------------------------------------------------
# HYP-27.a: VRR (FreeSync / G-Sync) on by default on capable
# monitors. Per-monitor opt-out lands via HYP-27.b (mde-config
# Settings > Display).
misc {
    vrr = 1
}

# ---------------------------------------------------------------
# Decoration
# ---------------------------------------------------------------
# HYP-19: 4 px corners on every window class (matches --radius-sm
# token from data/css/tokens.css).
# HYP-20: Blur off on windows by default; Portal layer-shell
# surfaces opt in via the layerrule below.
decoration {
    rounding = 4
    blur {
        enabled = false
    }
}

# ---------------------------------------------------------------
# Layer-shell rules
# ---------------------------------------------------------------
# HYP-20: Portal surfaces (Hub, breadcrumb overlay, notifications,
# wallpaper, lock) get a blurred backdrop. Every other layer-shell
# surface and every window stays sharp.
layerrule = blur, ^(mde-portal-.*)$

# ---------------------------------------------------------------
# Window rules
# ---------------------------------------------------------------
# HYP-25.a: VOIP call windows auto-promote to real fullscreen
# (covers other surfaces; panel + notifications draw under). The
# mde-voice-hud overlay (Top layer) remains visible per HYP-25.c
# so mic mute / hangup gestures stay accessible mid-call.
windowrulev2 = fullscreenstate 2, class:^(org.mde.voice.*)$

# ---------------------------------------------------------------
# Animations
# ---------------------------------------------------------------
# HYP-23: Built-in `default` curve only (no `bezier = m3-...`
# definitions). Iced retains the Material 3 curves intra-surface.
# HYP-24: Durations match the 100/120/150 ms motion-vocabulary
# grid. Values are in 10 ms units per Hyprland's animation syntax.
animations {
    enabled = true
    animation = windows, 1, 12, default, popin
    animation = workspaces, 1, 15, default, slide
    animation = fade, 1, 10, default
    animation = border, 1, 10, default
    animation = layers, 1, 10, default, fade
}

# ---------------------------------------------------------------
# Mouse binds
# ---------------------------------------------------------------
# HYP-13: Mod+Right-drag (BTN_RIGHT == 273) live-resizes the
# focused window. Replaces the legacy keyboard-mode resize submap
# (no `submap = resize` block in this file). Amends Portal R12 Q44
# — the breadcrumb mode segment retains its tag-mode use case but
# never surfaces a "resize" name because no submap is registered.
bindm = SUPER, mouse:273, resizewindow
