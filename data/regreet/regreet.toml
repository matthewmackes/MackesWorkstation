# /etc/greetd/regreet.toml — Mackes Desktop Environment greeter (ReGreet).
#
# ReGreet reads this path by default (GREETD_CONFIG_DIR=/etc/greetd) and loads
# its stylesheet from /etc/greetd/regreet.css. Both unknown keys AND a parse
# error fall back to built-in defaults (ReGreet's load_toml is lenient), so a
# bad edit can never block login.
#
# Schema note (2026-06-08): this matches the REAL ReGreet config struct. The
# charcoal background, the MDE palette, and all widget styling live in the CSS
# (regreet.css → tokens.css), NOT here — ReGreet has no `style`, `sessions_dir`,
# `[background] color`, or `*_command` keys (the old DM-3 draft used those and
# they were silently dropped). Edits survive `dnf upgrade` (%config(noreplace)).

# Always prompt for a username and show the session picker — no auto-login
# (the DM 10-Q Q4 lock: greetd always falls through to a prompt).
skip_selection = false

[appearance]
greeting_msg = "Mackes Desktop Environment"

[GTK]
# Dark by default so the greeter reads as the IBM Carbon shell even in the
# window between GTK init and the CSS loading.
application_prefer_dark_theme = true

[commands]
reboot = ["systemctl", "reboot"]
poweroff = ["systemctl", "poweroff"]

[widget.clock]
# Day · ISO date · 24h time — matches the shell panel's clock segment.
format = "%A · %Y-%m-%d · %H:%M"
