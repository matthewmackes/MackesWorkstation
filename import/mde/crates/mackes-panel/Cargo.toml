[package]
name        = "mackes-panel"
description = "Mackes XFCE Workstation panel — top status bar + bottom dock."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mackes-panel"
path = "src/main.rs"

[dependencies]
mackes-config     = { path = "../mackes-config" }
mackes-mesh-types = { path = "../mackes-mesh-types" }
mackes-theme      = { path = "../mackes-theme" }
gtk               = { version = "0.18", package = "gtk", features = ["v3_24"] }
gdk               = { version = "0.18" }
gdk-pixbuf        = { version = "0.18" }
gio               = { version = "0.18" }
glib              = { version = "0.18" }
libc              = "0.2"
serde             = { version = "1", features = ["derive"] }
serde_json        = "1"
sha2              = "0.10"

[dev-dependencies]
# Notification-center tests use isolated XDG_CACHE_HOME dirs so the
# save/load round-trip doesn't clobber the user's real cache.
tempfile = "3"

[lints]
workspace = true
