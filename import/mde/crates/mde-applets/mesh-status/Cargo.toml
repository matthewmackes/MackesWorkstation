[package]
name        = "mde-applet-mesh-status"
description = "Mesh-status chip — top-bar-right peer-count + health applet (Phase E1.2.4)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mde-applet-mesh-status"
path = "src/main.rs"

[lib]
name = "mde_applet_mesh_status"
path = "src/lib.rs"

[dependencies]
mde-applet-api = { path = "../applet-api" }
serde          = { version = "1", features = ["derive"] }
serde_json     = "1"

[lints]
workspace = true
