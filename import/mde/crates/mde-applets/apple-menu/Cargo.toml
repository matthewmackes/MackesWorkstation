[package]
name        = "mde-applet-apple-menu"
description = "macOS-Spotlight-style Super+Space popover — fuzzy launcher over .desktop files + recents + math eval"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
name = "mde_applet_apple_menu"
path = "src/lib.rs"

[[bin]]
name = "mde-applet-apple-menu"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
mde-applet-api = { path = "../applet-api" }
serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
