[package]
name        = "mackes-mesh-types"
description = "Shared mesh-resource types — peers, mounted shares, services."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
# Portal-18.a (v6.0 R12 lock 2026-05-26) — tag-store JSON
# (de)serialization. Already a dev-dependency; promoted to a
# real dep when the tag store landed since `TagStore::load_from`
# + `TagStore::save_to` are public on the lib surface.
serde_json = "1"
# Portal-53.b.types-share (2026-05-27) — window-rules TOML
# (de)serialization. The window-rules module is hosted here
# (not in mackesd) so mde-portal's Hub right-click modal can
# import the types without depending on mackesd.
toml = "0.8"
# Portal-18.a — XDG resolution for the default tag-store path
# (`<XDG_DATA_HOME>/mde/tags.json`).
dirs = "5"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
