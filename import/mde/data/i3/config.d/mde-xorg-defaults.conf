# MDE-X — default keyboard shortcuts (XOrg/i3 edition)
#
# Shipped at `/usr/share/mde-xorg/i3/config.d/mde-xorg-defaults.conf`
# and included by mde-xorg.config via
# `include ~/.config/i3/config.d/*.conf`.
# mde-session-xorg seeds the user's ~/.config/i3/config.d/ from this
# file on first login.
#
# Mirrors data/sway/config.d/mackes-defaults.conf with i3-syntax
# differences (--no-startup-id prefix, xfce4-terminal, scrot/maim
# for screenshots).
# Every shortcut here is overridable via
# ~/.config/i3/config.d/mde-overrides.conf (loaded alphabetically after
# this file). settings::keybinds writes mackes-bindings.conf to the same
# directory; that file also wins alphabetically.
#
# Documented in docs/help/keyboard-shortcuts.md — keep the two in sync.

# Apple-style menu (mde-panel --apple-menu popover)
bindsym $mod+space exec --no-startup-id mde-panel --apple-menu

# Notification drawer
bindsym $mod+m exec --no-startup-id mde --drawer

# Default hotkeys
bindsym $mod+q exec --no-startup-id i3-msg [con_id=__focused__] kill
bindsym $mod+l exec --no-startup-id loginctl lock-session
bindsym $mod+v exec --no-startup-id mde --focus clipboard
bindsym $mod+e exec --no-startup-id xdg-open ~/QNM-Shared

# F3 — Exposé overlay stub (landing in a future release)
bindsym F3 exec --no-startup-id notify-send "MDE-X" "Exposé overlay coming soon"

# Volume keys — pactl (same as sway config)
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +5%
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -5%
bindsym XF86AudioMute        exec --no-startup-id pactl set-sink-mute   @DEFAULT_SINK@ toggle

# Brightness keys — brightnessctl (works on both X11 + Wayland)
bindsym XF86MonBrightnessUp   exec --no-startup-id brightnessctl set +5%
bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 5%-

# Screenshot — scrot (XOrg-native; grim is Wayland-only)
bindsym Print       exec --no-startup-id scrot ~/Pictures/screen-%Y%m%d-%H%M%S.png
bindsym Shift+Print exec --no-startup-id scrot -s ~/Pictures/region-%Y%m%d-%H%M%S.png
