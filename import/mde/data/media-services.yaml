# Mackes Mesh Services catalog (§8.13 lock).
#
# Authoritative list of HTTP services Mackes probes for on every mesh peer.
# Consumed by all five mesh-services layers:
#   - Layer 1: rendered into the raw-URL cheatsheet in Help
#   - Layer 2: Media Hub panel uses (port, icon, display-name) for Tiles
#   - Layer 3: Caddy proxy generates a route per discovered (service, peer)
#   - Layer 4: native-client autoconfig narrows to entries where `native-client` is set
#   - Layer 5: mDNS relay subscribes to entries where `mdns-type` is set
#
# Users can add overrides at ~/.config/mackes-shell/media-services.yaml;
# entries with matching `name` override the shipped values.

services:

  # ---- Media ------------------------------------------------------------
  - name:          jellyfin
    display:       "Jellyfin"
    category:      media
    port:          8096
    https-port:    8920
    path:          "/"
    icon:          jellyfin
    mdns-type:     "_jellyfin._tcp"
    native-client: jellyfin-media-player
    description:   "Open-source media server (video, music, photos)."

  - name:          airsonic
    display:       "Airsonic / Subsonic"
    category:      media
    port:          4040
    path:          "/"
    icon:          airsonic
    mdns-type:     "_subsonic._tcp"
    native-client: strawberry
    description:   "Music streaming server (Subsonic-compatible API)."

  - name:          plex
    display:       "Plex"
    category:      media
    port:          32400
    path:          "/web"
    icon:          plex
    mdns-type:     "_plex._tcp"
    description:   "Plex Media Server."

  - name:          navidrome
    display:       "Navidrome"
    category:      media
    port:          4533
    path:          "/"
    icon:          navidrome
    native-client: strawberry
    description:   "Modern music server (Subsonic-compatible API)."

  - name:          kodi
    display:       "Kodi (web)"
    category:      media
    port:          8080
    path:          "/"
    icon:          kodi
    description:   "Kodi web interface."

  - name:          komga
    display:       "Komga"
    category:      media
    port:          25600
    path:          "/"
    icon:          komga
    description:   "Comic and ebook server."

  # ---- Download / media management --------------------------------------
  - name:          sonarr
    display:       "Sonarr"
    category:      media-mgmt
    port:          8989
    path:          "/"
    icon:          sonarr
    description:   "TV series management."

  - name:          radarr
    display:       "Radarr"
    category:      media-mgmt
    port:          7878
    path:          "/"
    icon:          radarr
    description:   "Movie management."

  - name:          lidarr
    display:       "Lidarr"
    category:      media-mgmt
    port:          8686
    path:          "/"
    icon:          lidarr
    description:   "Music collection management."

  - name:          prowlarr
    display:       "Prowlarr"
    category:      media-mgmt
    port:          9696
    path:          "/"
    icon:          prowlarr
    description:   "Indexer manager for the *arr suite."

  - name:          qbittorrent
    display:       "qBittorrent"
    category:      media-mgmt
    port:          8080
    path:          "/"
    icon:          qbittorrent
    description:   "Torrent client web UI."

  - name:          transmission
    display:       "Transmission"
    category:      media-mgmt
    port:          9091
    path:          "/transmission/web/"
    icon:          transmission
    description:   "Lightweight torrent client web UI."

  # ---- Home automation / IoT --------------------------------------------
  - name:          home-assistant
    display:       "Home Assistant"
    category:      iot
    port:          8123
    path:          "/"
    icon:          home-assistant
    mdns-type:     "_home-assistant._tcp"
    description:   "Open-source home automation platform."

  - name:          node-red
    display:       "Node-RED"
    category:      iot
    port:          1880
    path:          "/"
    icon:          node-red
