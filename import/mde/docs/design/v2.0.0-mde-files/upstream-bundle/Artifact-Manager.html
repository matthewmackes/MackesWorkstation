<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Artifact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500;600;700&family=Red+Hat+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!--
  ARTIFACT MANAGER
  ────────────────
  Mesh-first file manager forked from pop-os/cosmic-files, re-skinned for
  matthewmackes/MAP2-RELEASES. Design intent:

    • MESH is the home base. The sidebar is dominated by mesh peers, the
      shared inbox, and the outbox. Network overview is the default landing.
    • DOWNLOADS is the single primary local pin (highlighted in amber).
      Everything peers send arrives here with an origin pill.
    • THE LOCAL FILESYSTEM is deliberately demoted. Home/Documents/Pictures/…
      live behind a dashed "Browse filesystem…" disclosure that has to be
      opened intentionally — and even then renders as a private explainer
      card, not a flat folder listing.
    • Files originating from a mesh peer wear an amber  ↘ peer.mesh  pill so
      they stand out next to neutral gray "local" pills. The visual rhythm
      of the file list quickly conveys what arrived from where.

  Visual language inherits the MAP2 / Mackes warm-dark palette:
    – PatternFly v6 dark surface tokens
    – Red Hat Display / Text / Mono type
    – Amber-rust accent (#f0ab00 → #e36b3a)
    – PatternFly success / info / danger for status

  Single-file, no build step. React 18 + Babel standalone via inline scripts.
-->

<style>
  :root {
    /* PatternFly v6 dark surface tokens */
    --pf-bg-100: #151515;
    --pf-bg-200: #1b1d21;
    --pf-bg-300: #1f1f1f;
    --pf-bg-400: #292929;
    --pf-border: #444548;
    --pf-text-100: #f0f0f0;
    --pf-text-200: #b8bbbe;
    --pf-text-300: #8a8d90;

    /* Warm-dark accent (amber-rust) */
    --accent: #f0ab00;
    --accent-hi: #ffc107;
    --rust: #e36b3a;
    --pf-info: #2b9af3;
    --pf-success: #3e8635;
    --pf-danger: #c9190b;

    --bg: var(--pf-bg-100);
    --fg: var(--pf-text-100);
    --fg-dim: var(--pf-text-200);
    --fg-faint: var(--pf-text-300);
    --window: var(--pf-bg-300);
    --window-titlebar: var(--pf-bg-200);
    --window-side: #252527;
    --divider: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background:
      radial-gradient(120% 80% at 50% 30%, #2a1408 0%, #14100a 60%, #0a0806 100%);
    font-family: "Red Hat Text", "Red Hat Display", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  h1, h2, h3, h4 { font-family: "Red Hat Display", "Red Hat Text", "Segoe UI", system-ui, sans-serif; }
  .mono, code, kbd { font-family: "Red Hat Mono", ui-monospace, "Cascadia Code", "Consolas", monospace; }
  #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input { font: inherit; color: inherit; }

  /* ============================================================
     WINDOW CHROME
     ============================================================ */
  .window {
    width: min(1480px, 94vw);
    height: min(940px, 92vh);
    background: var(--window);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.4);
    display: grid;
    grid-template-rows: 32px 1fr;
  }
  .titlebar {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: stretch;
    background: var(--window-titlebar);
    border-bottom: 1px solid var(--divider);
  }
  .titlebar .app-icon {
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
  }
  .titlebar .title {
    display: flex; align-items: center;
    font-size: 12px; color: var(--fg-dim);
    letter-spacing: 0.2px;
    font-family: "Red Hat Text", system-ui;
  }
  .titlebar .title strong { color: var(--fg); font-weight: 600; margin-right: 6px; }
  .win-controls { display: flex; }
  .win-controls button {
    width: 46px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--fg-dim);
    transition: background 90ms ease;
  }
  .win-controls button:hover { background: rgba(255,255,255,0.08); color: var(--fg); }
  .win-controls .close:hover { background: #e81123; color: #fff; }

  .window-body {
    display: grid;
    grid-template-columns: 248px 1fr;
    min-height: 0;
  }
  .side {
    background: var(--window-side);
    border-right: 1px solid var(--divider);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .side-top {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 6px;
    border-bottom: 1px solid var(--divider);
  }
  .side-top button {
    width: 30px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
    color: var(--fg-dim);
  }
  .side-top button:hover { background: rgba(255,255,255,0.08); color: var(--fg); }

  /* ============================================================
     ARTIFACT MANAGER — sidebar
     ============================================================ */
  .fm-titlebar-meta {
    display: inline-flex; align-items: center; gap: 8px;
    margin-left: 8px;
    font-family: "Red Hat Mono", monospace;
    font-size: 11px; color: var(--fg-faint);
  }
  .fm-titlebar-meta .dot-online {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3e8635; box-shadow: 0 0 6px rgba(62,134,53,0.6);
  }

  .fm-side-list {
    flex: 1;
    overflow: auto;
    padding: 0 0 6px;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .fm-side-local {
    flex: 0 0 auto;
    border-top: 1px solid var(--divider);
    padding-bottom: 4px;
    background: rgba(0,0,0,0.18);
  }
  .fm-side-section {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 10px 14px 4px;
    font-family: "Red Hat Mono", monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-faint);
  }
  .fm-side-section .meta { letter-spacing: 0; text-transform: none; color: var(--fg-faint); font-size: 10px; }
  .fm-side-section.mesh { color: var(--accent-hi); }
  .fm-side-section.mesh .meta { color: var(--fg-dim); }

  .fm-side-item {
    display: grid;
    grid-template-columns: 18px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--fg-dim);
    cursor: default;
    border-left: 2px solid transparent;
    line-height: 1.2;
  }
  .fm-side-item:hover { background: rgba(255,255,255,0.05); color: var(--fg); }
  .fm-side-item.active {
    background: rgba(227,107,58,0.16);
    color: #fff;
    border-left-color: var(--rust);
  }
  .fm-side-item .dot { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; color: var(--fg-faint); }
  .fm-side-item.active .dot { color: var(--accent-hi); }
  .fm-side-item .nm {
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .fm-side-item.peer .nm .host { font-family: "Red Hat Mono", monospace; font-size: 12px; }
  .fm-side-item .nm .latency { font-family: "Red Hat Mono", monospace; font-size: 10px; color: var(--fg-faint); }
  .fm-side-item .meta { font-family: "Red Hat Mono", monospace; font-size: 10px; color: var(--fg-faint); }
  .fm-side-item.dim { color: var(--fg-faint); opacity: 0.85; }
  .fm-side-item.dim .dot { color: var(--fg-faint); opacity: 0.7; }
  .fm-side-item.dim:hover { opacity: 1; color: var(--fg-dim); }
  .fm-side-item.primary {
    background: rgba(240,171,0,0.06);
    border-left-color: rgba(240,171,0,0.55);
    color: var(--fg);
  }
  .fm-side-item.primary:hover { background: rgba(240,171,0,0.12); }
  .fm-side-item.primary.active {
    background: rgba(240,171,0,0.18);
    border-left-color: var(--accent-hi);
  }
  .fm-side-item.primary .dot { color: var(--accent-hi); }
  .fm-side-item.peer.offline { color: var(--fg-faint); }
  .fm-side-item.peer.offline .dot { opacity: 0.6; }

  .peer-status {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--fg-faint);
    display: inline-block; flex: 0 0 auto;
  }
  .peer-status.online { background: #3e8635; box-shadow: 0 0 6px rgba(62,134,53,0.6); }
  .peer-status.idle   { background: #f0ab00; }
  .peer-status.offline{ background: #444548; }
  .peer-status.self   { background: var(--rust); box-shadow: 0 0 6px rgba(227,107,58,0.6); }

  .fm-side-disclose {
    margin: 8px 12px 4px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px dashed rgba(255,255,255,0.10);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--fg-dim);
    font-family: "Red Hat Mono", monospace;
    cursor: default;
  }
  .fm-side-disclose:hover { color: var(--fg); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); }
  .fm-side-disclose svg { color: var(--fg-faint); flex: 0 0 auto; }
  .fm-side-disclose .lbl { flex: 1; }
  .fm-side-disclose .hint { color: var(--fg-faint); font-size: 10px; letter-spacing: 0.04em; }
  .fm-side-disclose.open { background: rgba(255,255,255,0.04); color: var(--fg); border-style: solid; }

  .fm-side-foot {
    margin-top: auto;
    padding: 10px 14px;
    border-top: 1px solid var(--divider);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    font-size: 11px;
    color: var(--fg-faint);
    font-family: "Red Hat Mono", monospace;
  }
  .fm-side-foot button {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px;
    background: rgba(240,171,0,0.10);
    border: 1px solid rgba(240,171,0,0.30);
    color: var(--accent-hi);
    font-size: 11px;
    font-family: "Red Hat Mono", monospace;
  }
  .fm-side-foot button:hover { background: rgba(240,171,0,0.18); }

  /* ============================================================
     ARTIFACT MANAGER — main content
     ============================================================ */
  .fm-main {
    overflow: hidden;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    background: var(--pf-bg-300);
  }
  .fm-toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--divider);
    background: var(--pf-bg-200);
    flex-wrap: nowrap;
  }
  .fm-toolbar .spacer { flex: 1; min-width: 4px; }
  .fm-crumbs {
    display: flex; align-items: center; gap: 6px;
    font-family: "Red Hat Mono", monospace;
    font-size: 12px;
    color: var(--fg-dim);
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .fm-crumbs .crumb { padding: 2px 4px; cursor: default; }
  .fm-crumbs .crumb:hover { color: var(--fg); background: rgba(255,255,255,0.04); }
  .fm-crumbs .crumb-mesh { color: var(--accent-hi); }
  .fm-crumbs .crumb-sep { color: var(--fg-faint); padding: 0 2px; }
  .fm-crumbs .crumb-current { color: var(--fg); }
  .fm-crumbs .crumb-tag {
    font-size: 10px;
    padding: 1px 6px;
    border: 1px solid rgba(240,171,0,0.30);
    background: rgba(240,171,0,0.08);
    color: var(--accent);
    margin-left: 4px;
    letter-spacing: 0.06em;
  }
  .fm-crumbs .crumb-tag.local {
    border-color: rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--fg-faint);
  }
  .fm-search-mini {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.05);
    padding: 4px 8px;
    font-size: 12px;
    width: 220px; flex: 0 1 220px; min-width: 120px;
    border: 1px solid transparent;
  }
  .fm-search-mini:focus-within { border-color: rgba(240,171,0,0.45); }
  .fm-search-mini input { background: transparent; border: 0; outline: 0; width: 100%; color: var(--fg); }
  .fm-view-toggle { display: flex; border: 1px solid var(--divider); }
  .fm-view-toggle button {
    width: 28px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--fg-dim);
  }
  .fm-view-toggle button.active { background: rgba(240,171,0,0.14); color: var(--accent-hi); }
  .fm-toolbar .fm-action {
    padding: 5px 12px;
    background: var(--accent);
    color: #1a1206;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .fm-toolbar .fm-action:hover { background: var(--accent-hi); }
  .fm-toolbar .fm-action.ghost {
    background: transparent;
    color: var(--fg-dim);
    border: 1px solid var(--divider);
  }
  .fm-toolbar .fm-action.ghost:hover { color: var(--fg); border-color: rgba(255,255,255,0.20); }

  .fm-content { padding: 18px 22px 28px; overflow: auto; min-height: 0; }

  .fm-banner {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background:
      linear-gradient(90deg, rgba(240,171,0,0.10) 0%, rgba(227,107,58,0.05) 50%, transparent 100%),
      var(--pf-bg-200);
    border: 1px solid rgba(240,171,0,0.18);
    border-left: 3px solid var(--accent);
    margin-bottom: 22px;
  }
  .fm-banner .ico {
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent-hi);
    background: rgba(240,171,0,0.10);
    border: 1px solid rgba(240,171,0,0.20);
  }
  .fm-banner .ttl { font-family: "Red Hat Display", system-ui, sans-serif; font-size: 15px; font-weight: 600; color: var(--fg); }
  .fm-banner .sub { font-family: "Red Hat Mono", monospace; font-size: 11px; color: var(--fg-dim); margin-top: 2px; }
  .fm-banner .stats { display: flex; gap: 22px; align-items: baseline; }
  .fm-banner .stats .stat { text-align: right; font-family: "Red Hat Mono", monospace; }
  .fm-banner .stats .stat .n { display: block; font-size: 20px; color: var(--accent-hi); font-weight: 600; line-height: 1; }
  .fm-banner .stats .stat .k { font-size: 9px; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 4px; }

  .fm-section-h { display: flex; align-items: baseline; justify-content: space-between; margin: 22px 0 10px; }
  .fm-section-h:first-child { margin-top: 0; }
  .fm-section-h h3 { font-family: "Red Hat Display", system-ui, sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); margin: 0; font-weight: 600; }
  .fm-section-h .right { font-family: "Red Hat Mono", monospace; font-size: 10px; color: var(--fg-faint); display: flex; align-items: center; gap: 10px; }

  /* Peer cards */
  .fm-peer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 10px; }
  .fm-peer-card {
    background: var(--pf-bg-200);
    border: 1px solid var(--divider);
    padding: 14px 14px 10px;
    display: flex; flex-direction: column;
    gap: 12px;
    cursor: default;
    transition: border-color 90ms ease, background 90ms ease;
    position: relative;
    overflow: hidden;
  }
  .fm-peer-card:hover { border-color: rgba(240,171,0,0.4); }
  .fm-peer-card.self { border-color: rgba(227,107,58,0.4); }
  .fm-peer-card.self .stripe { background: var(--rust); }
  .fm-peer-card.online .stripe { background: #3e8635; }
  .fm-peer-card.idle .stripe { background: var(--accent); }
  .fm-peer-card.offline { opacity: 0.55; }
  .fm-peer-card.offline .stripe { background: #444548; }
  .fm-peer-card .stripe { position: absolute; left: 0; right: 0; top: 0; height: 2px; }
  .fm-peer-card .head { display: flex; align-items: center; gap: 10px; }
  .fm-peer-card .avatar {
    width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    color: var(--fg-dim);
    font-family: "Red Hat Mono", monospace;
    font-size: 13px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .fm-peer-card.online .avatar { color: var(--accent-hi); border-color: rgba(240,171,0,0.30); }
  .fm-peer-card.self .avatar { color: var(--rust); border-color: rgba(227,107,58,0.35); }
  .fm-peer-card .ident { min-width: 0; flex: 1; }
  .fm-peer-card .host { font-family: "Red Hat Mono", monospace; font-size: 13px; color: var(--fg); display: flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fm-peer-card .label { font-size: 11px; color: var(--fg-faint); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fm-peer-card .num-row { display: flex; align-items: baseline; gap: 16px; font-family: "Red Hat Mono", monospace; }
  .fm-peer-card .num-row .num { font-size: 16px; color: var(--fg); font-weight: 600; }
  .fm-peer-card .num-row .key { font-size: 9px; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.14em; margin-left: 4px; }
  .fm-peer-card .meta-row { display: flex; justify-content: space-between; gap: 8px; font-family: "Red Hat Mono", monospace; font-size: 10px; color: var(--fg-faint); }
  .fm-peer-card .meta-row .lat-good { color: #3e8635; }
  .fm-peer-card .meta-row .lat-ok { color: var(--accent); }
  .fm-peer-card .actions { display: flex; gap: 4px; padding-top: 8px; border-top: 1px solid var(--divider); }
  .fm-peer-card .actions button {
    padding: 4px 8px;
    font-size: 11px;
    color: var(--fg-dim);
    background: transparent;
    border: 1px solid transparent;
    font-family: "Red Hat Text", system-ui;
  }
  .fm-peer-card .actions button:hover { background: rgba(255,255,255,0.05); color: var(--fg); }
  .fm-peer-card .actions button.primary {
    background: rgba(240,171,0,0.10);
    color: var(--accent-hi);
    border-color: rgba(240,171,0,0.25);
  }
  .fm-peer-card .actions button.primary:hover { background: rgba(240,171,0,0.20); }

  /* File rows */
  .fm-list { display: flex; flex-direction: column; }
  .fm-row {
    display: grid;
    grid-template-columns: 22px 1fr auto 120px 100px;
    gap: 12px;
    align-items: center;
    padding: 7px 8px;
    font-size: 13px;
    color: var(--fg);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: default;
  }
  .fm-row:hover { background: rgba(255,255,255,0.03); }
  .fm-row.mesh { background: rgba(240,171,0,0.025); }
  .fm-row.mesh:hover { background: rgba(240,171,0,0.06); }
  .fm-row .ico { color: var(--fg-faint); }
  .fm-row.mesh .ico { color: var(--accent); }
  .fm-row .name { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fm-row .name .fn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fm-row .meta { font-family: "Red Hat Mono", monospace; font-size: 11px; color: var(--fg-dim); text-align: right; }
  .fm-row .src { text-align: left; }
  .fm-row.head {
    font-family: "Red Hat Mono", monospace;
    font-size: 10px;
    color: var(--fg-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--divider);
    background: rgba(255,255,255,0.02);
    padding: 6px 8px;
  }
  .fm-row.head:hover { background: rgba(255,255,255,0.02); }
  .fm-row.head .meta { color: var(--fg-faint); text-align: right; }
  .fm-row.head .src { text-align: left; }

  .mesh-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 6px;
    background: rgba(240,171,0,0.10);
    color: var(--accent-hi);
    font-family: "Red Hat Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.02em;
    border: 1px solid rgba(240,171,0,0.25);
    white-space: nowrap;
  }
  .mesh-pill .arrow { color: var(--rust); }
  .local-pill {
    display: inline-flex; align-items: center;
    padding: 1px 6px;
    background: rgba(255,255,255,0.03);
    color: var(--fg-faint);
    font-family: "Red Hat Mono", monospace;
    font-size: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
  }

  /* Transfer log */
  .fm-tx {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px; align-items: center;
    padding: 8px 10px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .fm-tx:last-child { border-bottom: 0; }
  .fm-tx .dir {
    font-family: "Red Hat Mono", monospace;
    font-size: 10px;

      <div className="num-row">
        <div><span className="num">{fmt(peer.files)}</span><span className="key">Files</span></div>
        <div><span className="num">{fmt(peer.shared)}</span><span className="key">Shared</span></div>
      </div>
      <div className="meta-row">
        <span>{peer.addr}</span>
        <span>
          {peer.latency != null
            ? <span className={latClass}>{peer.latency} ms · {peer.derp}</span>
            : <span>last seen {peer.last}</span>}
        </span>
      </div>
      <div className="actions">
        <button className="primary">Browse →</button>
        <button>Send file</button>
        <button title="more"><I.more width="14" height="14"/></button>
      </div>
    </div>
  );
}

function FileRow({ row, showSrc }) {
  const isMesh = !!row.mesh || !!row.from;
  const src = row.mesh || row.from;
  return (
    <div className={'fm-row' + (isMesh ? ' mesh' : '')}>
      <span className="ico"><FMime mime={row.mime}/></span>
      <span className="name"><span className="fn">{row.name}</span></span>
      {showSrc
        ? <span className="src">{isMesh
            ? <span className="mesh-pill"><span className="arrow">↘</span>{src}</span>
            : <span className="local-pill">local</span>}</span>
        : <span/>}
      <span className="meta">{row.size}</span>
      <span className="meta">{row.age}</span>
    </div>
  );
}

function FilesPathBar({ crumbs }) {
  return (
    <div className="fm-crumbs">
      {crumbs.map((c, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span className="crumb-sep">/</span>}
          <span className={'crumb' + (c.mesh ? ' crumb-mesh' : '') + (i === crumbs.length-1 ? ' crumb-current' : '')}>
            {c.label}
          </span>
        </React.Fragment>
      ))}
      {crumbs.some(c => c.mesh)
        ? <span className="crumb-tag">MESH</span>
        : <span className="crumb-tag local">LOCAL</span>}
    </div>
  );
}

function MeshOverview({ onPickPeer }) {
  const online = FM_PEERS.filter(p => p.status === 'online').length;
  const totalShared = FM_PEERS.reduce((a,p) => a + p.shared, 0) + FM_SELF.shared;
  return (
    <React.Fragment>
      <div className="fm-banner">
        <div className="ico"><I.meshHub width="22" height="22"/></div>
        <div>
          <div className="ttl">Mesh is up · {online} of {FM_PEERS.length} peers reachable</div>
          <div className="sub">tailnet · {FM_SELF.host} ({FM_SELF.addr}) · DERP fra · {FM_SELF.shared} of {FM_SELF.files.toLocaleString()} files shared by this node</div>
        </div>
        <div className="stats">
          <div className="stat"><span className="n">{online}</span><div className="k">Online</div></div>
          <div className="stat"><span className="n">{totalShared.toLocaleString()}</span><div className="k">Shared</div></div>
        </div>
      </div>

      <div className="fm-section-h">
        <h3>Peers · {FM_PEERS.length}</h3>
        <div className="right"><span style={{color:'var(--fg-dim)'}}>tailnet</span> · sorted by latency</div>
      </div>
      <div className="fm-peer-grid">
        {FM_PEERS.map(p => <PeerCard key={p.id} peer={p} onOpen={() => onPickPeer('peer:' + p.id)}/>)}
      </div>

      <div className="fm-section-h" style={{marginTop: 28}}>
        <h3>Recent mesh transfers</h3>
        <div className="right">last 24 h</div>
      </div>
      <div className="fm-list">
        {FM_RECENT.map((t, i) => (
          <div key={i} className={'fm-tx ' + t.dir}>
            <span className="dir">{t.dir === 'in' ? '↘ IN' : '↗ OUT'}</span>
            <span className="name"><span className="fn">{t.name}</span></span>
            <span className="peer">{t.peer}</span>
            <span className="age">{t.size} · {t.age}</span>
          </div>
        ))}
      </div>
    </React.Fragment>
  );
}

function PeerFolder({ peer, files }) {
  const KI = FM_PEER_KIND_ICON[peer.kind] || I.server;
  return (
    <React.Fragment>
      <div className="fm-banner">
        <div className="ico"><KI width="22" height="22"/></div>
        <div>
          <div className="ttl">
            <span className={'peer-status ' + peer.status} style={{marginRight:8, verticalAlign:'middle'}}/>
            {peer.host} <span style={{color:'var(--fg-faint)', fontFamily:'"Red Hat Mono", monospace', fontSize:12, fontWeight:400}}>· {peer.label}</span>
          </div>
          <div className="sub">{peer.addr} · {peer.latency != null ? peer.latency + ' ms via ' + peer.derp : 'last seen ' + peer.last} · {peer.shared.toLocaleString()} files shared with this node</div>
        </div>
        <div className="stats">
          <div className="stat"><span className="n">{fmt(peer.files)}</span><div className="k">Total files</div></div>
          <div className="stat"><span className="n">{fmt(peer.shared)}</span><div className="k">Shared</div></div>
        </div>
      </div>
      <div className="fm-section-h">
        <h3>Shared with this node</h3>
        <div className="right">{files.length} items</div>
      </div>
      <div className="fm-list">
        <div className="fm-row head">
          <span/><span>Name</span><span className="src">Origin</span><span className="meta">Size</span><span className="meta">Modified</span>
        </div>
        {files.map((f, i) => <FileRow key={i} row={{ ...f, from: peer.host }} showSrc={true}/>)}
      </div>
    </React.Fragment>
  );
}

function Inbox() {
  return (
    <React.Fragment>
      <div className="fm-banner">
        <div className="ico"><I.inbox width="22" height="22"/></div>
        <div>
          <div className="ttl">Mesh inbox</div>
          <div className="sub">files peers sent to {FM_SELF.host} · auto-routed to ~/mesh/inbox/</div>
        </div>
        <div className="stats">
          <div className="stat"><span className="n">{FM_INBOX.length}</span><div className="k">Items</div></div>
          <div className="stat"><span className="n">{new Set(FM_INBOX.map(f => f.from)).size}</span><div className="k">From peers</div></div>
        </div>
      </div>
      <div className="fm-list">
        <div className="fm-row head">
          <span/><span>Name</span><span className="src">From</span><span className="meta">Size</span><span className="meta">Received</span>
        </div>
        {FM_INBOX.map((f, i) => <FileRow key={i} row={f} showSrc={true}/>)}
      </div>
    </React.Fragment>
  );
}

function Downloads() {
  const meshCount = FM_DOWNLOADS.filter(d => d.mesh).length;
  return (
    <React.Fragment>
      <div className="fm-banner">
        <div className="ico"><I.download width="22" height="22"/></div>
        <div>
          <div className="ttl">Downloads <span style={{color:'var(--fg-faint)', fontFamily:'"Red Hat Mono", monospace', fontSize:12, fontWeight:400}}>· ~/Downloads</span></div>
          <div className="sub">local downloads · {meshCount} item{meshCount===1?'':'s'} arrived via mesh transfer</div>
        </div>
        <div className="stats">
          <div className="stat"><span className="n">{FM_DOWNLOADS.length}</span><div className="k">Items</div></div>
          <div className="stat"><span className="n">{meshCount}</span><div className="k">From mesh</div></div>
        </div>
      </div>
      <div className="fm-list">
        <div className="fm-row head">
          <span/><span>Name</span><span className="src">Origin</span><span className="meta">Size</span><span className="meta">Added</span>
        </div>
        {FM_DOWNLOADS.map((d, i) => <FileRow key={i} row={d} showSrc={true}/>)}
      </div>
    </React.Fragment>
  );
}

function LocalVeil() {
  // Subdued local-filesystem view. Reads as an explainer card, not a folder.
  return (
    <div className="fm-content">
      <div className="fm-local-veil">
        <h2><I.hdd width="18" height="18"/> Local filesystem <span className="lbl-pill">private to {FM_SELF.host}</span></h2>
        <p>
          This is the unsynced filesystem on <code style={{color:'var(--accent-hi)',fontFamily:'"Red Hat Mono", monospace'}}>{FM_SELF.host}</code>.
          Nothing here is visible to other peers. To share, move a file into <code style={{color:'var(--accent-hi)',fontFamily:'"Red Hat Mono", monospace'}}>~/mesh</code> or
          drag it onto a peer in the sidebar.
        </p>
        <div className="grid">
          {FM_LOCAL_PINS.map(p => (
            <div key={p.id} className="pin">
              <p.icon width="16" height="16"/>
              <span>{p.name}</span>
              <span className="ct">{p.ct}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="fm-section-h">
        <h3>Recent locally-modified</h3>
        <div className="right">~/ · last 24 h</div>
      </div>
      <div className="fm-list">
        <div className="fm-row head">
          <span/><span>Name</span><span className="src">Where</span><span className="meta">Size</span><span className="meta">Modified</span>
        </div>
        <FileRow row={{ name: '.bashrc',                 mime: 'doc',   size: '3 KB',   age: '2 h' }} showSrc={true}/>
        <FileRow row={{ name: 'Documents/journal.md',    mime: 'doc',   size: '14 KB',  age: '5 h' }} showSrc={true}/>
        <FileRow row={{ name: 'code/map2/',              mime: 'folder',size: '— · 312 items', age: '12 min' }} showSrc={true}/>
        <FileRow row={{ name: 'Pictures/wallpapers/',    mime: 'folder',size: '— · 28 items',  age: '1 d' }} showSrc={true}/>
      </div>
    </div>
  );
}

/* ============================================================
   ARTIFACT MANAGER — root component
   ============================================================ */
function ArtifactManager() {
  const [view, setView] = useState('mesh');
  const [localOpen, setLocalOpen] = useState(false);
  const [layout, setLayout] = useState('list');

  const isMesh = view === 'mesh' || view === 'inbox' || view.startsWith('peer:');
  const isDownloads = view === 'downloads';

  // Breadcrumbs
  let crumbs;
  if (view === 'mesh')        crumbs = [{ label: 'Mesh', mesh: true }, { label: 'Overview' }];
  else if (view === 'inbox')  crumbs = [{ label: 'Mesh', mesh: true }, { label: 'Inbox' }];
  else if (view.startsWith('peer:')) {
    const p = FM_PEERS.find(p => p.id === view.slice(5));
    crumbs = [{ label: 'Mesh', mesh: true }, { label: p ? p.host : '?' }];
  }
  else if (view === 'downloads') crumbs = [{ label: '~' }, { label: 'Downloads' }];
  else if (view === 'local')     crumbs = [{ label: 'Local' }, { label: FM_SELF.host }, { label: '/' }];
  else                            crumbs = [{ label: 'Mesh', mesh: true }];

  // Body
  let body = null;
  if (view === 'mesh') body = <MeshOverview onPickPeer={setView}/>;
  else if (view === 'inbox') body = <Inbox/>;
  else if (view.startsWith('peer:')) {
    const id = view.slice(5);
    const peer = FM_PEERS.find(p => p.id === id);
    const files = id === 'pine' ? FM_PINE_FILES : id === 'birch' ? FM_BIRCH_FILES : id === 'oak' ? FM_OAK_FILES : [];
    body = peer ? <PeerFolder peer={peer} files={files}/> : <div className="fm-empty">no peer</div>;
  }
  else if (view === 'downloads') body = <Downloads/>;
  // view === 'local' is rendered via LocalVeil below.

  const onlinePeers = FM_PEERS.filter(p => p.status === 'online').length;

  return (
    <div className="window" data-screen-label="Artifact Manager">
      <div className="titlebar">
        <div className="app-icon"><I.meshHub width="14" height="14"/></div>
        <div className="title">
          <strong>Artifact Manager</strong>
          <span className="fm-titlebar-meta">
            <span className="dot-online"/> mesh up · {onlinePeers}/{FM_PEERS.length} peers
          </span>
        </div>
        <div className="win-controls">
          <button data-tip="Minimize"><I.minus width="14" height="14"/></button>
          <button data-tip="Maximize"><I.maximize width="12" height="12"/></button>
          <button className="close" data-tip="Close"><I.close width="14" height="14"/></button>
        </div>
      </div>

      <div className="window-body">
        <aside className="side">
          <div className="side-top">
            <button data-tip="Toggle sidebar"><I.panelRight width="16" height="16"/></button>
            <button data-tip="Back" onClick={() => setView('mesh')}><I.arrowLeft width="16" height="16"/></button>
            <div style={{flex:1}}/>
            <button data-tip="Refresh mesh"><I.refresh width="16" height="16"/></button>
          </div>

          {/* ===== MESH — the predominant rail ===== */}
          <div className="fm-side-list">
            <div className="fm-side-section mesh">
              <span>◆ Mesh</span>
              <span className="meta">{onlinePeers}/{FM_PEERS.length} peers</span>
            </div>

            <div
              className={'fm-side-item' + (view === 'mesh' ? ' active' : '')}
              onClick={() => setView('mesh')}
            >
              <span className="dot"><I.meshHub width="16" height="16"/></span>
              <span className="nm">Network overview</span>
              <span className="meta">{FM_PEERS.length + 1}</span>
            </div>

            {/* self */}
            <div
              className={'fm-side-item peer self'}
              title="This node — your shared mesh folder"
            >
              <span className="dot"><span className="peer-status self"/></span>
              <span className="nm">
                <span className="host" style={{color:'var(--rust)', fontFamily:'"Red Hat Mono", monospace', fontSize:12}}>{FM_SELF.host}</span>
                <span className="latency">· you</span>
              </span>
              <span className="meta">{FM_SELF.shared}</span>
            </div>

            {FM_PEERS.map(p => (
              <div
                key={p.id}
                className={'fm-side-item peer ' + p.status + (view === 'peer:' + p.id ? ' active' : '')}
                onClick={() => setView('peer:' + p.id)}
              >
                <span className="dot"><span className={'peer-status ' + p.status}/></span>
                <span className="nm">
                  <span className="host">{p.host}</span>
                  {p.latency != null && <span className="latency">· {p.latency}ms</span>}
                </span>
                <span className="meta">{p.shared > 0 ? fmt(p.shared) : '—'}</span>
              </div>
            ))}

            <div
              className={'fm-side-item' + (view === 'inbox' ? ' active' : '')}
              onClick={() => setView('inbox')}
              style={{marginTop: 4}}
            >
              <span className="dot"><I.inbox width="16" height="16"/></span>
              <span className="nm">Inbox</span>
              <span className="meta">{FM_INBOX.length}</span>
            </div>
            <div className="fm-side-item">
              <span className="dot"><I.send width="16" height="16"/></span>
              <span className="nm">Outbox</span>
              <span className="meta">0</span>
            </div>
          </div>

          {/* ===== LOCAL — pinned at bottom, deliberately subdued ===== */}
          <div className="fm-side-local">
            <div className="fm-side-section">
              <span>Local</span>
              <span className="meta">this device</span>
            </div>
            <div
              className={'fm-side-item primary' + (view === 'downloads' ? ' active' : '')}
              onClick={() => setView('downloads')}
            >
              <span className="dot"><I.download width="16" height="16"/></span>
              <span className="nm">Downloads</span>
              <span className="meta">{FM_DOWNLOADS.length}</span>
            </div>

            {/* Folded disclosure for the rest of the filesystem */}
            <div
              className={'fm-side-disclose' + (localOpen ? ' open' : '')}
              onClick={() => {
                setLocalOpen(o => !o);
                if (!localOpen) setView('local');
                else if (view === 'local') setView('mesh');
              }}
            >
              {localOpen ? <I.chevronDown width="14" height="14"/> : <I.chevronRight width="14" height="14"/>}
              <span className="lbl">Browse filesystem…</span>
              <span className="hint">/</span>
            </div>

            {localOpen && FM_LOCAL_PINS.map(pin => (
              <div
                key={pin.id}
                className="fm-side-item dim"
                onClick={() => setView('local')}
              >
                <span className="dot"><pin.icon width="16" height="16"/></span>
                <span className="nm">{pin.name}</span>
                <span className="meta"/>
              </div>
            ))}
          </div>

          <div className="fm-side-foot">
            <span>tailnet · 10.0.7.0/24</span>
            <button><I.plus width="12" height="12"/> Peer</button>
          </div>
        </aside>

        <main className="fm-main">
          <div className="fm-toolbar">
            <FilesPathBar crumbs={crumbs}/>
            <div className="spacer"/>
            <div className="fm-search-mini">
              <I.search width="14" height="14"/>
              <input placeholder={isMesh ? 'Search mesh…' : 'Search…'}/>
            </div>
            <div className="fm-view-toggle">
              <button className={layout === 'list' ? 'active' : ''} onClick={() => setLayout('list')} data-tip="List"><I.listView width="14" height="14"/></button>
              <button className={layout === 'grid' ? 'active' : ''} onClick={() => setLayout('grid')} data-tip="Grid"><I.gridView width="14" height="14"/></button>
            </div>
            {isMesh
              ? <button className="fm-action"><I.send width="13" height="13"/> Send</button>
              : isDownloads
                ? <button className="fm-action"><I.upload width="13" height="13"/> Share</button>
                : <button className="fm-action ghost"><I.folder width="13" height="13"/> New</button>}
          </div>

          {view === 'local'
            ? <LocalVeil/>
            : <div className="fm-content">{body}</div>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ArtifactManager/>);
</script>
</body>
</html>
